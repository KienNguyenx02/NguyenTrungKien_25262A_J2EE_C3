<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Giỏ hàng</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
</head>
<body class="container mt-5">
    <h2>Giỏ hàng của bạn</h2>
    <div th:if="${error}" class="alert alert-danger" th:text="${error}"></div>
    <a href="/products" class="btn btn-secondary mb-3">Tiếp tục mua sắm</a>
    
    <div th:if="${cart.empty}" class="alert alert-warning">
        Giỏ hàng đang trống!
    </div>

    <div th:if="${!cart.empty}">
        <table class="table table-bordered">
            <thead>
                <tr>
                    <th>Hình ảnh</th>
                    <th>Tên sản phẩm</th>
                    <th>Giá</th>
                    <th>Số lượng</th>
                    <th>Thành tiền</th>
                    <th>Hành động</th>
                </tr>
            </thead>
            <tbody>
                <tr th:each="item : ${cart}">
                    <td>
                        <img th:if="${item.image != null}" th:src="@{'/uploads/' + ${item.image}}" width="50" height="50"/>
                    </td>
                    <td th:text="${item.name}"></td>
                    <td th:text="${item.price}"></td>
                    <td>
                        <form th:action="@{/cart/update}" method="post" class="d-flex">
                            <input type="hidden" name="id" th:value="${item.productId}">
                            <input type="number" name="quantity" th:value="${item.quantity}" min="1" class="form-control form-control-sm w-25">
                            <button type="submit" class="btn btn-sm btn-primary ms-1">Cập nhật</button>
                        </form>
                    </td>
                    <td th:text="${item.price * item.quantity}"></td>
                    <td>
                        <a th:href="@{'/cart/remove/' + ${item.productId}}" class="btn btn-danger btn-sm">Xóa</a>
                    </td>
                </tr>
            </tbody>
            <tfoot>
                <tr>
                    <td colspan="4" class="text-end"><strong>Tổng tiền:</strong></td>
                    <td colspan="2"><strong th:text="${total}"></strong></td>
                </tr>
            </tfoot>
        </table>
        <div class="text-end">
            <a href="/cart/checkout" class="btn btn-success btn-lg" onclick="return confirm('Xác nhận đặt hàng?')">Đặt hàng (Thanh toán)</a>
        </div>
    </div>
</body>
</html>
