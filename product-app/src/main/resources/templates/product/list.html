<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Danh sách sản phẩm</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
</head>
<body class="container mt-5">
    <h2>Danh sách sản phẩm</h2>
    <a href="/products/create" class="btn btn-primary mb-3">Thêm sản phẩm mới</a>
    <table class="table table-bordered">
        <thead>
            <tr>
                <th>ID</th>
                <th>Hình ảnh</th>
                <th>Tên</th>
                <th>Giá</th>
                <th>Danh mục</th>
                <th>Hành động</th>
            </tr>
        </thead>
        <tbody>
            <tr th:each="p : ${products}">
                <td th:text="${p.id}"></td>
                <td>
                    <img th:if="${p.image != null}" th:src="@{'/uploads/' + ${p.image}}" width="50" height="50"/>
                    <img th:unless="${p.image != null}" src="https://via.placeholder.com/50" width="50" height="50"/>
                </td>
                <td th:text="${p.name}"></td>
                <td th:text="${p.price}"></td>
                <td th:text="${p.category.name}"></td>
                <td>
                    <a th:href="@{'/products/edit/' + ${p.id}}" class="btn btn-warning btn-sm">Sửa</a>
                    <a th:href="@{'/products/delete/' + ${p.id}}" class="btn btn-danger btn-sm" onclick="return confirm('Xóa?')">Xóa</a>
                </td>
            </tr>
        </tbody>
    </table>
</body>
</html>
