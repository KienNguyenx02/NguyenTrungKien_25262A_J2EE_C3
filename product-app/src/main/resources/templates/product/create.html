<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Thêm sản phẩm</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
</head>
<body class="container mt-5">
    <h2>Thêm sản phẩm mới</h2>
    <form th:action="@{/products/save}" th:object="${product}" method="post" enctype="multipart/form-data">
        <div class="mb-3">
            <label class="form-label">Tên sản phẩm:</label>
            <input type="text" th:field="*{name}" class="form-control">
            <p th:if="${#fields.hasErrors('name')}" th:errors="*{name}" class="text-danger"></p>
        </div>
        <div class="mb-3">
            <label class="form-label">Giá:</label>
            <input type="number" th:field="*{price}" class="form-control">
            <p th:if="${#fields.hasErrors('price')}" th:errors="*{price}" class="text-danger"></p>
        </div>
        <div class="mb-3">
            <label class="form-label">Danh mục:</label>
            <select th:field="*{category.id}" class="form-select">
                <option th:each="c : ${categories}" th:value="${c.id}" th:text="${c.name}"></option>
            </select>
        </div>
        <div class="mb-3">
            <label class="form-label">Hình ảnh:</label>
            <input type="file" name="imageFile" class="form-control">
        </div>
        <button type="submit" class="btn btn-success">Lưu</button>
        <a href="/products" class="btn btn-secondary">Hủy</a>
    </form>
</body>
</html>
